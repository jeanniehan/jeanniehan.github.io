<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage with Text and Light Switch</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section id="homePage" class="background-container">
        <div class="overlay-text">
            <h1>Zaluzianskya ovata</h1>
            <p>Moons rising glow spreads honey
as midnight candy blooms
reach for her nocturnal kiss
offering fragrant rewards.</p>
        </div>
        <label class="switch">
            <input type="checkbox" onclick="toggleLight()">
            <span class="slider round"></span>
        </label>
    </section>
    <script src="main.js"></script>
</body>
</html>
